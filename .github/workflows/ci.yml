name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests + Coverage
        run: npm run test:coverage

      - name: Check coverage threshold (80%)
        run: |
          # npm test:coverage already sets --coverage; if it fails under 80%,
          # the command exits with error code and the job fails.
          echo "Coverage check built into Jest via coverageThreshold."